<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Vibe Tempo Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    <style>
        @keyframes expand {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }
        .visualizer-ring {
            position: absolute; width: 100px; height: 100px;
            border-radius: 50%; background: rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans transition-colors duration-300">

    <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 relative overflow-hidden transition-colors duration-300">
        
        <div class="flex justify-between items-start mb-2">
            <div>
                <h1 class="text-3xl font-bold text-blue-600 dark:text-blue-400">Tempo Vibes</h1>
                <div class="flex items-center gap-2 mt-1">
                    <p class="text-gray-500 dark:text-gray-400 text-sm">Session Swings: <span id="swing-counter" class="font-bold text-blue-600 dark:text-blue-400">0</span></p>
                    <button id="reset-counter" class="text-[10px] bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-0.5 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors uppercase font-bold tracking-wider">Reset</button>
                </div>
            </div>
            <button id="theme-toggle" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-full text-xs font-bold uppercase tracking-wide transition-colors">
                ☀️ Outdoor
            </button>
        </div>

        <div id="visualizer-container" class="h-40 w-full flex items-center justify-center relative my-6 bg-gray-200 dark:bg-gray-700 rounded-xl overflow-hidden">
            <div id="core-circle" class="w-24 h-24 bg-blue-500 rounded-full z-10 flex items-center justify-center shadow-lg transition-transform duration-100">
                <span id="swing-state" class="font-bold text-xl text-white tracking-wider text-center px-2">READY</span>
            </div>
            <div id="ring" class="visualizer-ring hidden"></div>
        </div>

        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium mb-1 text-gray-600 dark:text-gray-300">Tempo (Ratio)</label>
                    <select id="tempo-select" class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="3">3:1 (Full Swing)</option>
                        <option value="2">2:1 (Short Game)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1 text-gray-600 dark:text-gray-300">Audio Vibe</label>
                    <select id="vibe-select" class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="classic">Classic Metronome</option>
                        <option value="glock">Glockenspiel (Low)</option>
                        <option value="snare">Percussion Snap</option>
                        <option value="marimba">Marimba Wood</option>
                        <option value="bass">Deep Heartbeat</option>
                        <option value="scifi">Sci-Fi Laser</option>
                        <option value="zen">Zen Bow</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-xs font-medium text-gray-600 dark:text-gray-300">Swing Speed</label>
                    <span id="speed-display" class="text-xs text-blue-600 dark:text-blue-400 font-bold">1.2s</span>
                </div>
                <input type="range" id="speed-slider" min="0.8" max="2.0" step="0.1" value="1.2" class="w-full accent-blue-500">
            </div>

            <hr class="border-gray-300 dark:border-gray-600 my-2">

            <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Enable Auto-Loop</label>
                <input type="checkbox" id="loop-toggle" class="w-5 h-5 accent-blue-500 rounded" checked>
            </div>

            <div id="delay-container" class="transition-opacity">
                <div class="flex justify-between mb-1">
                    <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Setup Delay Between Loops</label>
                    <span id="delay-display" class="text-xs text-blue-600 dark:text-blue-400 font-bold">8s</span>
                </div>
                <input type="range" id="delay-slider" min="3" max="20" step="1" value="8" class="w-full accent-blue-500">
            </div>
        </div>

        <button id="play-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-colors text-lg uppercase tracking-widest relative">
            START
        </button>
        
        <p class="text-center text-[10px] text-gray-400 dark:text-gray-500 mt-4 tracking-wider">v1.8 (Native Track Renderer)</p>
    </div>

    <audio id="native-audio-player" class="hidden" playsinline></audio>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed:', err)); });
        }

        const nativePlayer = document.getElementById('native-audio-player');
        
        const playBtn = document.getElementById('play-btn');
        const tempoSelect = document.getElementById('tempo-select');
        const speedSlider = document.getElementById('speed-slider');
        const speedDisplay = document.getElementById('speed-display');
        const vibeSelect = document.getElementById('vibe-select');
        const loopToggle = document.getElementById('loop-toggle');
        const delaySlider = document.getElementById('delay-slider');
        const delayDisplay = document.getElementById('delay-display');
        const delayContainer = document.getElementById('delay-container');
        
        const coreCircle = document.getElementById('core-circle');
        const swingStateText = document.getElementById('swing-state');
        const ring = document.getElementById('ring');
        const swingCounterDisplay = document.getElementById('swing-counter');
        const resetCounterBtn = document.getElementById('reset-counter');
        const themeToggle = document.getElementById('theme-toggle');

        let isPlaying = false;
        let swingCount = 0;
        let animationFrameId = null;
        let lastVisualState = 'READY';
        let currentObjectUrl = null;

        // Visual Timings (calculated when Render is hit)
        let vDelay = 0;
        let vBackswing = 0;
        let vDownswing = 0;
        let vImpactTime = 0;
        let vTotalDuration = 0;

        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) themeToggle.textContent = '☀️ Outdoor';
            else themeToggle.textContent = '🌙 Dark';
        });

        resetCounterBtn.addEventListener('click', () => { swingCount = 0; swingCounterDisplay.textContent = swingCount; });
        speedSlider.addEventListener('input', (e) => speedDisplay.textContent = `${e.target.value}s`);
        delaySlider.addEventListener('input', (e) => delayDisplay.textContent = `${e.target.value}s`);
        loopToggle.addEventListener('change', (e) => {
            if (e.target.checked) delayContainer.classList.remove('opacity-50', 'pointer-events-none');
            else delayContainer.classList.add('opacity-50', 'pointer-events-none');
        });

        // --- THE DYNAMIC TRACK RENDERER ---
        
        // 1. Convert AudioBuffer to WAV format directly in the browser
        function audioBufferToWav(buffer) {
            const numOfChan = buffer.numberOfChannels;
            const length = buffer.length * numOfChan * 2 + 44;
            const arrayBuffer = new ArrayBuffer(length);
            const view = new DataView(arrayBuffer);
            const channels = [];
            let i, sample, offset = 0, pos = 0;

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); 
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt "
            setUint32(16); 
            setUint16(1); 
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan); 
            setUint16(numOfChan * 2); 
            setUint16(16); 
            setUint32(0x61746164); // "data"
            setUint32(length - pos - 4); 

            for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0;
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }
            return new Blob([arrayBuffer], { type: "audio/wav" });
        }

        // 2. Synthesize Tone inside the Offline Context
        function buildTone(ctx, vibeType, startTime, duration, beatNumber) {
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            gainNode.connect(ctx.destination); 
            
            let isImpact = (beatNumber === 3);
            let freq = 800; let oscType = 'sine'; let decay = 0.1; let sustain = 0.001;

            if (vibeType === 'classic') {
                freq = isImpact ? 1200 : 800; oscType = 'triangle'; decay = 0.08; 
            } else if (vibeType === 'glock') {
                freq = isImpact ? 1500 : 1000; oscType = 'sine'; decay = 0.6; sustain = 0.1;
            } else if (vibeType === 'snare') {
                if (isImpact) {
                    const bufferSize = ctx.sampleRate * 0.15;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const output = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
                    
                    const noise = ctx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = ctx.createBiquadFilter();
                    filter.type = "highpass"; filter.frequency.setValueAtTime(800, startTime);
                    noise.connect(filter).connect(gainNode);
                    noise.start(startTime);
                    
                    gainNode.gain.setValueAtTime(0, startTime);
                    gainNode.gain.linearRampToValueAtTime(1, startTime + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
                    noise.stop(startTime + 0.15);
                    return; 
                } else {
                    freq = 400; oscType = 'square'; decay = 0.03;
                }
            } else if (vibeType === 'marimba') {
                freq = isImpact ? 600 : 400; oscType = 'sine'; decay = 0.2;
                const clickOsc = ctx.createOscillator();
                clickOsc.type = 'triangle'; clickOsc.frequency.setValueAtTime(freq*2, startTime);
                clickOsc.connect(gainNode); clickOsc.start(startTime); clickOsc.stop(startTime + 0.02);
            } else if (vibeType === 'bass') {
                freq = isImpact ? 100 : 65; oscType = 'sine'; decay = 0.3;
            } else if (vibeType === 'scifi') {
                freq = isImpact ? 800 : 400; oscType = 'sawtooth'; decay = 0.2;
                osc.frequency.setValueAtTime(freq, startTime);
                osc.frequency.exponentialRampToValueAtTime(freq / 2, startTime + decay); 
            } else if (vibeType === 'zen') {
                freq = beatNumber === 1 ? 440 : (beatNumber === 2 ? 660 : 220); 
                oscType = 'sine'; decay = 1.0; sustain = 0.2;
            }

            osc.type = oscType;
            if (vibeType !== 'scifi') osc.frequency.setValueAtTime(freq, startTime);
            osc.connect(gainNode);
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(1, startTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(sustain, startTime + decay);
            osc.start(startTime);
            osc.stop(startTime + decay);
        }

        function buildTick(ctx, startTime) {
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(1000, startTime);
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(0.1, startTime + 0.005);
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 0.05);
            osc.start(startTime);
            osc.stop(startTime + 0.05);
        }

        // 3. Render the entire track instantly into memory
        async function generateAudioTrack() {
            playBtn.textContent = "RENDERING...";
            
            const totalSwingTime = parseFloat(speedSlider.value);
            const ratio = parseInt(tempoSelect.value);
            const vibe = vibeSelect.value;
            const isLooping = loopToggle.checked;
            const delayTime = isLooping ? parseInt(delaySlider.value) : 1; 

            const totalParts = ratio + 1;
            vBackswing = totalSwingTime * (ratio / totalParts);
            vDownswing = totalSwingTime * (1 / totalParts);
            vDelay = delayTime;
            vImpactTime = vDelay + vBackswing + vDownswing;
            
            // Allow 1 second of audio tail after impact so chords ring out
            vTotalDuration = vImpactTime + 1.0; 

            const sampleRate = 44100;
            const offlineCtx = new OfflineAudioContext(1, sampleRate * vTotalDuration, sampleRate);

            // Schedule Ticks (3, 2, 1 before the swing)
            if (delayTime >= 3) {
                buildTick(offlineCtx, delayTime - 3);
                buildTick(offlineCtx, delayTime - 2);
                buildTick(offlineCtx, delayTime - 1);
            }

            // Schedule the Swing
            buildTone(offlineCtx, vibe, vDelay, 0, 1); // Start
            buildTone(offlineCtx, vibe, vDelay + vBackswing, 0, 2); // Top
            buildTone(offlineCtx, vibe, vImpactTime, 0, 3); // Impact

            // Render and Export
            const renderedBuffer = await offlineCtx.startRendering();
            const wavBlob = audioBufferToWav(renderedBuffer);
            
            if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
            currentObjectUrl = URL.createObjectURL(wavBlob);
            
            nativePlayer.src = currentObjectUrl;
            nativePlayer.loop = isLooping;
        }

        // --- VISUAL SYNC ENGINE ---
        // This watches the native audio player and updates the screen ONLY when it's on
        function syncVisuals() {
            if (!isPlaying) return;

            const t = nativePlayer.currentTime;
            let newState = '';

            // 1. Setup Phase
            if (t < vDelay) {
                let timeLeft = Math.ceil(vDelay - t);
                newState = `SETUP`;
                swingStateText.textContent = `${timeLeft}s`;
                coreCircle.className = "w-24 h-24 bg-gray-500 rounded-full z-10 flex items-center justify-center shadow-lg";
                coreCircle.style.transform = "scale(1)";
            } 
            // 2. Backswing Phase
            else if (t >= vDelay && t < (vDelay + vBackswing)) {
                newState = 'BACK';
                swingStateText.textContent = "BACK";
                coreCircle.className = "w-24 h-24 bg-purple-500 rounded-full z-10 flex items-center justify-center shadow-lg transition-transform duration-100";
                coreCircle.style.transform = "scale(0.8)";
            } 
            // 3. Top of Swing Phase
            else if (t >= (vDelay + vBackswing) && t < vImpactTime) {
                newState = 'TOP';
                swingStateText.textContent = "TOP";
                coreCircle.className = "w-24 h-24 bg-yellow-500 rounded-full z-10 flex items-center justify-center shadow-lg transition-transform duration-100";
                coreCircle.style.transform = "scale(1.2)";
            } 
            // 4. Follow Through / Impact Phase
            else if (t >= vImpactTime) {
                newState = 'IMPACT';
                swingStateText.textContent = "IMPACT!";
                coreCircle.className = "w-24 h-24 bg-green-500 rounded-full z-10 flex items-center justify-center shadow-lg transition-transform duration-100";
                coreCircle.style.transform = "scale(1)";
            }

            // Detect Impact Transition to trigger animations and counter
            if (lastVisualState !== 'IMPACT' && newState === 'IMPACT') {
                ring.classList.remove('hidden');
                ring.style.animation = "none"; void ring.offsetWidth; 
                ring.style.animation = "expand 0.5s ease-out forwards";
                
                swingCount++;
                swingCounterDisplay.textContent = swingCount;
            }

            lastVisualState = newState;
            animationFrameId = requestAnimationFrame(syncVisuals);
        }

        // --- CONTROLS ---
        async function togglePlay() {
            if (isPlaying) {
                nativePlayer.pause();
                isPlaying = false;
                cancelAnimationFrame(animationFrameId);
                
                playBtn.textContent = "START";
                playBtn.classList.replace('bg-red-600', 'bg-blue-600');
                playBtn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
                
                swingStateText.textContent = "READY";
                coreCircle.className = "w-24 h-24 bg-blue-500 rounded-full z-10 flex items-center justify-center shadow-lg transition-transform duration-100";
                coreCircle.style.transform = "scale(1)";
                ring.classList.add('hidden');
                ring.style.animation = "";
                lastVisualState = 'READY';
                
                if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
            } else {
                await generateAudioTrack();
                
                nativePlayer.play();
                isPlaying = true;
                
                playBtn.textContent = "STOP";
                playBtn.classList.replace('bg-blue-600', 'bg-red-600');
                playBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');

                // Apple Watch / Lock Screen Meta
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: `${parseInt(tempoSelect.value)}:1 Tempo Loop`,
                        artist: 'Golf Vibes PWA',
                        artwork: [{ src: 'icon-512.png', sizes: '512x512', type: 'image/png' }]
                    });
                    navigator.mediaSession.setActionHandler('play', togglePlay);
                    navigator.mediaSession.setActionHandler('pause', togglePlay);
                    navigator.mediaSession.playbackState = 'playing';
                }

                animationFrameId = requestAnimationFrame(syncVisuals);
            }
        }

        playBtn.addEventListener('click', togglePlay);
        
        // Single shot auto-stop logic
        nativePlayer.addEventListener('ended', () => {
            if (!loopToggle.checked && isPlaying) togglePlay();
        });

    </script>
</body>
</html>
