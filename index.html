<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Vibe Tempo Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @keyframes expand {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(3); opacity: 0; }
        }
        .visualizer-ring {
            position: absolute; width: 100px; height: 100px;
            border-radius: 50%; background: rgba(59, 130, 246, 0.5);
            transition: all linear;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen flex flex-col items-center justify-center p-4 font-sans transition-colors duration-300">

    <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 relative overflow-hidden transition-colors duration-300">
        
        <div class="flex justify-between items-start mb-2">
            <div>
                <h1 class="text-3xl font-bold text-blue-600 dark:text-blue-400">Tempo Vibes</h1>
                <div class="flex items-center gap-2 mt-1">
                    <p class="text-gray-500 dark:text-gray-400 text-sm">Session Swings: <span id="swing-counter" class="font-bold text-blue-600 dark:text-blue-400">0</span></p>
                    <button id="reset-counter" class="text-[10px] bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-0.5 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors uppercase font-bold tracking-wider">Reset</button>
                </div>
            </div>
            <button id="theme-toggle" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-full text-xs font-bold uppercase tracking-wide transition-colors">
                ☀️ Outdoor
            </button>
        </div>

        <div id="visualizer-container" class="h-40 w-full flex items-center justify-center relative my-6 bg-gray-200 dark:bg-gray-700 rounded-xl overflow-hidden">
            <div id="core-circle" class="w-24 h-24 bg-blue-500 rounded-full z-10 flex items-center justify-center shadow-lg transition-transform duration-100">
                <span id="swing-state" class="font-bold text-xl text-white tracking-wider text-center px-2">READY</span>
            </div>
            <div id="ring" class="visualizer-ring hidden"></div>
        </div>

        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium mb-1 text-gray-600 dark:text-gray-300">Tempo (Ratio)</label>
                    <select id="tempo-select" class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="3">3:1 (Full Swing)</option>
                        <option value="2">2:1 (Short Game)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1 text-gray-600 dark:text-gray-300">Audio Vibe</label>
                    <select id="vibe-select" class="w-full bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="classic">Classic Metronome</option>
                        <option value="glock">Glockenspiel (Low)</option>
                        <option value="snare">Percussion Snap</option>
                        <option value="marimba">Marimba Wood</option>
                        <option value="bass">Deep Heartbeat</option>
                        <option value="scifi">Sci-Fi Laser</option>
                        <option value="zen">Zen Bow</option>
                    </select>
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-xs font-medium text-gray-600 dark:text-gray-300">Swing Speed</label>
                    <span id="speed-display" class="text-xs text-blue-600 dark:text-blue-400 font-bold">1.2s</span>
                </div>
                <input type="range" id="speed-slider" min="0.8" max="2.0" step="0.1" value="1.2" class="w-full accent-blue-500">
            </div>

            <hr class="border-gray-300 dark:border-gray-600 my-2">

            <div class="flex items-center justify-between mb-2">
                <label class="text-sm font-medium text-blue-600 dark:text-blue-300">Enable Auto-Loop</label>
                <input type="checkbox" id="loop-toggle" class="w-5 h-5 accent-blue-500 rounded">
            </div>

            <div id="delay-container" class="opacity-50 pointer-events-none transition-opacity">
                <div class="flex justify-between mb-1">
                    <label class="text-xs font-medium text-gray-500 dark:text-gray-400">Setup Delay Between Loops</label>
                    <span id="delay-display" class="text-xs text-blue-600 dark:text-blue-400 font-bold">8s</span>
                </div>
                <input type="range" id="delay-slider" min="3" max="20" step="1" value="8" class="w-full accent-blue-500">
            </div>
        </div>

        <button id="play-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-colors text-lg uppercase tracking-widest relative">
            START
        </button>
        
        <p class="text-center text-[10px] text-gray-400 dark:text-gray-500 mt-4 tracking-wider">v1.6</p>
    </div>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed:', err));
            });
        }

        let audioCtx;

        // UI Elements
        const playBtn = document.getElementById('play-btn');
        const tempoSelect = document.getElementById('tempo-select');
        const speedSlider = document.getElementById('speed-slider');
        const speedDisplay = document.getElementById('speed-display');
        const vibeSelect = document.getElementById('vibe-select');
        const loopToggle = document.getElementById('loop-toggle');
        const delaySlider = document.getElementById('delay-slider');
        const delayDisplay = document.getElementById('delay-display');
        const delayContainer = document.getElementById('delay-container');
        
        const coreCircle = document.getElementById('core-circle');
        const swingStateText = document.getElementById('swing-state');
        const ring = document.getElementById('ring');
        const swingCounterDisplay = document.getElementById('swing-counter');
        const resetCounterBtn = document.getElementById('reset-counter');
        const themeToggle = document.getElementById('theme-toggle');

        // State Variables
        let isRunning = false;
        let loopTimeoutId = null;
        let countdownIntervalId = null;
        let swingCount = 0;

        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) themeToggle.textContent = '☀️ Outdoor';
            else themeToggle.textContent = '🌙 Dark';
        });

        // Reset Counter
        resetCounterBtn.addEventListener('click', () => {
            swingCount = 0;
            swingCounterDisplay.textContent = swingCount;
        });

        // UI Sliders
        speedSlider.addEventListener('input', (e) => speedDisplay.textContent = `${e.target.value}s`);
        delaySlider.addEventListener('input', (e) => delayDisplay.textContent = `${e.target.value}s`);
        
        loopToggle.addEventListener('change', (e) => {
            if (e.target.checked) delayContainer.classList.remove('opacity-50', 'pointer-events-none');
            else delayContainer.classList.add('opacity-50', 'pointer-events-none');
        });

        // Dedicated subtle countdown tick (distinct from swing vibes)
        function playCountdownTick(startTime) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(1000, startTime);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(0.1, startTime + 0.005);
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 0.05);
            osc.start(startTime);
            osc.stop(startTime + 0.05);
        }

        // Enhanced Synthesis Engine
        function playSynthesizedTone(vibeType, startTime, duration, beatNumber) {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination); // Connect up front so noises don't break
            
            let isImpact = (beatNumber === 3);

            let freq = 800;
            let oscType = 'sine';
            let decay = 0.1;
            let sustain = 0.001;

            if (vibeType === 'classic') {
                freq = isImpact ? 1200 : 800; 
                oscType = 'triangle'; 
                decay = 0.08; 
            } else if (vibeType === 'glock') {
                freq = isImpact ? 1500 : 1000; // Lowered pitches
                oscType = 'sine';
                decay = 0.6; 
                sustain = 0.1;
            } else if (vibeType === 'snare') {
                if (isImpact) {
                    const bufferSize = audioCtx.sampleRate * 0.15;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const output = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
                    
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = "highpass";
                    filter.frequency.setValueAtTime(800, startTime);
                    noise.connect(filter).connect(gainNode);
                    noise.start(startTime);
                    
                    gainNode.gain.setValueAtTime(0, startTime);
                    gainNode.gain.linearRampToValueAtTime(1, startTime + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + 0.15);
                    noise.stop(startTime + 0.15);
                    return; // Fixed!
                } else {
                    freq = 400; 
                    oscType = 'square';
                    decay = 0.03;
                }
            } else if (vibeType === 'marimba') {
                freq = isImpact ? 600 : 400; 
                oscType = 'sine';
                decay = 0.2;
                
                // Add a tiny 'thwack' to the mallet strike
                const clickOsc = audioCtx.createOscillator();
                clickOsc.type = 'triangle';
                clickOsc.frequency.setValueAtTime(freq*2, startTime);
                clickOsc.connect(gainNode);
                clickOsc.start(startTime);
                clickOsc.stop(startTime + 0.02);
                
            } else if (vibeType === 'bass') {
                freq = isImpact ? 100 : 65; 
                oscType = 'sine';
                decay = 0.3;
            } else if (vibeType === 'scifi') {
                freq = isImpact ? 800 : 400; 
                oscType = 'sawtooth';
                decay = 0.2;
                osc.frequency.setValueAtTime(freq, startTime);
                osc.frequency.exponentialRampToValueAtTime(freq / 2, startTime + decay); // Pitch drop
            } else if (vibeType === 'zen') {
                freq = beatNumber === 1 ? 440 : (beatNumber === 2 ? 660 : 220); 
                oscType = 'sine';
                decay = 1.0;
                sustain = 0.2;
            }

            osc.type = oscType;
            if (vibeType !== 'scifi') {
                osc.frequency.setValueAtTime(freq, startTime);
            }
            osc.connect(gainNode);
            
            gainNode.gain.setValueAtTime(0, startTime);
            gainNode.gain.linearRampToValueAtTime(1, startTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(sustain, startTime + decay);
            
            osc.start(startTime);
            osc.stop(startTime + decay);
        }

        function stopEngine() {
            isRunning = false;
            clearTimeout(loopTimeoutId);
            clearInterval(countdownIntervalId);
            
            playBtn.textContent = "START";
            playBtn.classList.replace('bg-red-600', 'bg-blue-600');
            playBtn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
            
            swingStateText.textContent = "READY";
            coreCircle.style.transform = "scale(1)";
            coreCircle.className = "w-24 h-24 bg-blue-500 rounded-full z-10 flex items-center justify-center shadow-lg transition-transform duration-100";
            ring.classList.add('hidden');
            ring.style.animation = "";
        }

        function startDelaySequence() {
            if (!isRunning) return;
            let timeLeft = parseInt(delaySlider.value);
            swingStateText.textContent = `${timeLeft}s`;
            coreCircle.className = "w-24 h-24 bg-gray-500 rounded-full z-10 flex items-center justify-center shadow-lg";

            countdownIntervalId = setInterval(() => {
                if (!isRunning) { clearInterval(countdownIntervalId); return; }
                timeLeft--;
                if (timeLeft > 0) {
                    swingStateText.textContent = `${timeLeft}s`;
                    if (timeLeft <= 3) playCountdownTick(audioCtx.currentTime); // Now totally distinct!
                } else {
                    clearInterval(countdownIntervalId);
                    executeSwingSequence();
                }
            }, 1000);
        }

        function executeSwingSequence() {
            if (!isRunning) return;

            const totalTime = parseFloat(speedSlider.value);
            const ratio = parseInt(tempoSelect.value); 
            const vibe = vibeSelect.value;
            const totalParts = ratio + 1;
            const backswingDuration = totalTime * (ratio / totalParts);
            const downswingDuration = totalTime * (1 / totalParts);

            const now = audioCtx.currentTime;
            const topOfSwingTime = now + backswingDuration;
            const impactTime = topOfSwingTime + downswingDuration;

            // Synthesis Dispatch
            playSynthesizedTone(vibe, now, 0, 1); 
            playSynthesizedTone(vibe, topOfSwingTime, 0, 2); 
            playSynthesizedTone(vibe, impactTime, 0, 3); 

            // Visual Logic
            swingStateText.textContent = "BACK";
            coreCircle.style.transform = "scale(0.8)";
            coreCircle.className = "w-24 h-24 bg-purple-500 rounded-full z-10 flex items-center justify-center shadow-lg transition-transform duration-100";

            setTimeout(() => {
                if (!isRunning) return;
                swingStateText.textContent = "TOP";
                coreCircle.style.transform = "scale(1.2)";
                coreCircle.classList.replace('bg-purple-500', 'bg-yellow-500');
            }, backswingDuration * 1000);

            setTimeout(() => {
                if (!isRunning) return;
                swingStateText.textContent = "IMPACT!";
                coreCircle.style.transform = "scale(1)";
                coreCircle.classList.replace('bg-yellow-500', 'bg-green-500');
                
                ring.classList.remove('hidden');
                ring.style.animation = "none"; void ring.offsetWidth; 
                ring.style.animation = "expand 0.5s ease-out forwards";

                swingCount++;
                swingCounterDisplay.textContent = swingCount;

                if (loopToggle.checked && isRunning) {
                    loopTimeoutId = setTimeout(startDelaySequence, 1000); 
                } else if (!loopToggle.checked) {
                    setTimeout(stopEngine, 1000);
                }
            }, (backswingDuration + downswingDuration) * 1000);
        }

        playBtn.addEventListener('click', () => {
            if (isRunning) { stopEngine(); return; }

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            isRunning = true;
            playBtn.textContent = "STOP";
            playBtn.classList.replace('bg-blue-600', 'bg-red-600');
            playBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');

            if (loopToggle.checked) startDelaySequence();
            else executeSwingSequence();
        });
    </script>
</body>
</html>
